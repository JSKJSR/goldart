<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOLDART — Register</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { justify-content: center; align-items: center; min-height: 100vh; }
    .auth-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 40px 36px;
      width: 360px;
      text-align: center;
    }
    .auth-card h1 { color: var(--gold); font-size: 24px; margin-bottom: 6px; }
    .auth-card .subtitle { color: var(--muted); font-size: 12px; margin-bottom: 28px; }
    .auth-card input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 14px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
    }
    .auth-card input:focus { outline: none; border-color: var(--gold); }
    .auth-card button {
      width: 100%;
      padding: 10px;
      background: var(--gold);
      color: var(--bg);
      border: none;
      border-radius: 4px;
      font-family: var(--font);
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      margin-top: 4px;
    }
    .auth-card button:hover { background: var(--gold-dim); }
    .auth-card .link { margin-top: 18px; font-size: 12px; color: var(--muted); }
    .flash { color: var(--red); font-size: 12px; margin-bottom: 14px; }
  </style>
</head>
<body>
  <div class="auth-card">
    <h1>GOLDART</h1>
    <div class="subtitle">Create your account</div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.register_post') }}">
      <input type="text" name="username" placeholder="Username" required autofocus>
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password (min 8 chars)" required>
      <input type="password" name="confirm" placeholder="Confirm password" required>
      <button type="submit">Register</button>
    </form>
    <div class="link">
      Already have an account? <a href="{{ url_for('auth.login') }}">Login</a>
    </div>
  </div>
</body>
</html>
